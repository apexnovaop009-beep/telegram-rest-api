services:
  # Production
  # docker compose --profile production up api --build -d
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    ports:
      - "3000:3000"
    env_file:
      - .env
    profiles:
      - production

  # Development
  # docker compose --profile development up api-dev --build -d
  api-dev:
    extends:
      service: api
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    profiles:
      - development
    command: sh -c "npm install && npm run dev"
